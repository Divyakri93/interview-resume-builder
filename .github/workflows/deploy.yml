name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t divyakri/interview-backend ./backend

      - name: Build Frontend Image
        run: docker build -t divyakri/interview-frontend ./frontend

      - name: Push Images
        run: |
          docker push divyakri/interview-backend
          docker push divyakri/interview-frontend